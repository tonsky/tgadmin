name: jar

on:
  push:
    branches:
      - 'main'
    paths:
      - 'src/**'
      - deps.edn
      - .github/workflows/jar.yml
      - script/package.sh

jobs:  
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - run: |
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_21_X64/bin" >> $GITHUB_PATH

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.5.2
        with:
          cli: latest

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure

      - name: Package
        run: ./script/package.sh

      - uses: actions/upload-artifact@v7
        with:
          name: jar
          path: 'target/*.jar'

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Deploy
        run: |
          scp target/tgadmin.jar tgadmin@tonsky.me:

      - name: Restart
        run: |
          ssh tgadmin@tonsky.me "kill \$(systemctl show --property MainPID --value tgadmin)"
